# Configuration Fluentd pour EFK

# Sources d'entrée
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type http
  port 9880
  bind 0.0.0.0
  body_size_limit 32m
  keepalive_timeout 10s
</source>

# Monitoring Fluentd
<source>
  @type monitor_agent
  bind 0.0.0.0
  port 24220
  include_config true
  include_retry true
</source>

# Logs d'application JSON
<source>
  @type tail
  path /var/log/containers/app/*.log
  pos_file /fluentd/log/app.log.pos
  tag app.logs
  read_from_head false

  <parse>
    @type multi_format

    <pattern>
      format json
      time_key timestamp
      time_format %Y-%m-%dT%H:%M:%S.%NZ
    </pattern>

    <pattern>
      format regexp
      expression /^(?<timestamp>\d{4}-\d{2}-\d{2})\|(?<level>[^|]+)\|(?<service>[^|]+)\|(?<message>[^|]+)\|user_id=(?<user_id>[^|]+)\|duration=(?<duration_ms>\d+)ms$/
      time_key timestamp
      time_format %Y-%m-%d
    </pattern>

    <pattern>
      format regexp
      expression /^(?<timestamp>[^ ]+) \[(?<level>[^\]]+)\] (?<service>[^ ]+) - (?<message>.*)$/
      time_key timestamp
      time_format %Y-%m-%dT%H:%M:%S.%NZ
    </pattern>

  </parse>
</source>

# Logs Nginx
<source>
  @type tail
  path /var/log/containers/nginx/*.log
  pos_file /fluentd/log/nginx.log.pos
  tag nginx.access
  read_from_head false

  <parse>
    @type regexp
    expression /^(?<remote_ip>[^ ]+) - (?<remote_user>[^ ]+) \[(?<timestamp>[^\]]+)\] "(?<method>[^ ]+) (?<path>[^ ]+) (?<protocol>[^"]+)" (?<status>\d+) (?<body_bytes>\d+)/
    time_format %d/%b/%Y:%H:%M:%S %z
  </parse>
</source>

# Logs système
<source>
  @type tail
  path /var/log/containers/system/*.log
  pos_file /fluentd/log/system.log.pos
  tag system.logs
  read_from_head false

  <parse>
    @type syslog
  </parse>
</source>

# Filtres pour enrichissement
<filter app.logs>
  @type record_transformer
  <record>
    environment production
    log_type application
  </record>
</filter>

<filter nginx.access>
  @type record_transformer
  enable_ruby true

  <record>
    environment production
    log_type nginx
    response_size_kb ${record["body_bytes"].to_i / 1024.0}
    is_error ${record["status"].to_i >= 400}
  </record>
</filter>

# Buffer et optimisation

<match **>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  logstash_format true
  logstash_prefix fluentd
  logstash_dateformat %Y.%m.%d
  include_timestamp true
  reload_connections false
  reload_on_failure true
  reconnect_on_error true
  request_timeout 30s

  <buffer>
    @type file
    path /fluentd/buffer/es
    flush_interval 2s
    flush_thread_count 4
    chunk_limit_size 8M
    queue_limit_length 1024
    overflow_action block
    retry_forever true
  </buffer>
</match>
