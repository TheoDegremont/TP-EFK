# Configuration optimisée pour haute charge

# Workers pour parallélisation
<system>
  workers 4
  root_dir /tmp/fluentd-buffers
</system>

# Source avec batch
<source>
  @type tail
  path /var/log/containers/**/*.log
  pos_file /fluentd/log/all.log.pos
  tag raw.logs
  read_from_head true
  refresh_interval 5
  multiline_flush_interval 5
  read_bytes_limit_per_second 8388608 # 8MB/s par fichier
  <parse>
    @type json
    time_key timestamp
    keep_time_key true
  </parse>
</source>

# Buffer avec file backend pour éviter OOM
<match raw.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix high-volume

  # Optimisations pour haute charge
  request_timeout 30s
  reload_connections false
  reconnect_on_error true
  reload_on_failure true

  # Buffer sur disque avec parallélisation
  <buffer>
    @type file
    path /fluentd/buffer/elasticsearch
    flush_mode interval
    flush_interval 10s
    flush_thread_count 8
    chunk_limit_size 10M
    total_limit_size 2G
    overflow_action drop_oldest_chunk
    retry_type exponential_backoff
    retry_timeout 1h
    retry_max_interval 30s
    compress gzip
  </buffer>

  # Bulk API settings
  bulk_message_request_threshold 20MB
</match>
